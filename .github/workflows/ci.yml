name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -Dwarnings
  RUSTC_WRAPPER: sccache
  SCCACHE_GHA_ENABLED: "true"

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
        with:
          rust-components: clippy,rustfmt
      - run: cargo fmt -- --check
      - run: cargo build --workspace
      - run: cargo clippy --workspace --all-targets

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
        with:
          tools: cargo-nextest
          enable-kvm: 'true'
      - run: cargo build --workspace
      - run: cargo nextest run --workspace --profile ci --features integration
      - name: Upload test results to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: target/nextest/ci/junit.xml
          report_type: test_results

  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
        with:
          rust-components: llvm-tools-preview
          tools: cargo-llvm-cov,cargo-nextest
          enable-kvm: 'true'
      - run: cargo build --workspace
      - run: cargo llvm-cov nextest --workspace --profile ci --lcov --output-path lcov.info --features integration
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: lcov.info
