name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -Dwarnings
  RUSTC_WRAPPER: sccache
  SCCACHE_GHA_ENABLED: "true"

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Harden apt against flaky mirrors
        run: |
          echo 'Acquire::ForceIPv4 "true";'        | sudo tee /etc/apt/apt.conf.d/99force-ipv4 >/dev/null
          echo 'Acquire::Retries "3";'              | sudo tee /etc/apt/apt.conf.d/99retries >/dev/null
          echo 'Acquire::http::Pipeline-Depth "0";' | sudo tee /etc/apt/apt.conf.d/99pipeline >/dev/null
          echo 'http://archive.ubuntu.com/ubuntu/'  | sudo tee /etc/apt/apt-mirrors.txt >/dev/null
          sudo sed -i -E \
            -e 's|https?://([a-z0-9-]+\.)*archive\.ubuntu\.com/ubuntu/?|http://archive.ubuntu.com/ubuntu/|g' \
            -e 's|https?://security\.ubuntu\.com/ubuntu/?|http://archive.ubuntu.com/ubuntu/|g' \
            /etc/apt/sources.list /etc/apt/sources.list.d/*.list /etc/apt/sources.list.d/*.sources 2>/dev/null || true

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang \
            llvm \
            libelf-dev \
            libcap-dev \
            binutils-dev \
            gcc \
            make \
            pkg-config
          sudo apt-get install -y linux-headers-$(uname -r) || true

      - name: Build and install bpftool
        run: |
          git clone --recurse-submodules --depth 1 https://github.com/libbpf/bpftool.git
          make -C bpftool/src -j$(nproc)
          sudo make -C bpftool/src install

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt, llvm-tools-preview

      - run: cargo fmt -- --check

      - uses: mozilla-actions/sccache-action@v0.0.9
        with:
          disable_annotations: true

      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov,cargo-nextest

      - name: Build all workspace members
        run: cargo build --workspace

      - name: Clippy
        run: cargo clippy --workspace --all-targets

      - name: Enable KVM access
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
          sudo chmod a+r /boot/vmlinuz-* 2>/dev/null || true

      - name: Run tests (nextest, CI profile)
        run: cargo nextest run --workspace --profile ci

      - name: Run coverage (cargo-llvm-cov)
        run: cargo llvm-cov --workspace --lcov --output-path lcov.info

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: lcov.info

      - name: Upload test results to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: target/nextest/ci/junit.xml
          report_type: test_results
