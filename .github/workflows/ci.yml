name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.sha }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -Dwarnings
  RUSTC_WRAPPER: sccache

jobs:
  lint:
    runs-on: ubuntu-latest
    env:
      SCCACHE_GHA_ENABLED: "true"
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
        with:
          rust-components: clippy,rustfmt
      - run: cargo fmt -- --check
      - run: cargo clippy --workspace --all-targets

  test-x64:
    runs-on: [self-hosted, X64]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest
      - run: cargo nextest run --workspace --profile ci --features integration
      - name: Test statistics
        if: ${{ !cancelled() }}
        run: cargo run -p cargo-ktstr -- ktstr test-stats
      - name: Upload test results to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: target/nextest/ci/junit.xml
          report_type: test_results

  test-arm64:
    runs-on: [self-hosted, Linux, kvm, kernel-build, ARM64]
    env:
      RUSTC_WRAPPER: ""
      KTSTR_GHA_CACHE: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest
      - name: Cache kernel images
        uses: actions/cache@v4
        with:
          path: ~/.cache/ktstr/kernels
          key: ktstr-kernels-arm64-${{ hashFiles('ktstr.kconfig') }}
          restore-keys: ktstr-kernels-arm64-
      - name: Build test kernel
        run: cargo run -p cargo-ktstr --features gha-cache -- ktstr kernel build
      - run: cargo nextest run --workspace --profile ci --features integration
      - name: Test statistics
        if: ${{ !cancelled() }}
        run: cargo run -p cargo-ktstr -- ktstr test-stats
      - name: Upload test results to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: target/nextest/ci/junit.xml
          report_type: test_results

  coverage:
    runs-on: [self-hosted, X64]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt,llvm-tools-preview
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov,cargo-nextest
      - run: cargo llvm-cov nextest --workspace --profile ci --lcov --output-path lcov.info --features integration
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: lcov.info
