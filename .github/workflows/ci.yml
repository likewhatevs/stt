name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -Dwarnings
  RUSTC_WRAPPER: sccache

jobs:
  lint:
    runs-on: ubuntu-latest
    env:
      SCCACHE_GHA_ENABLED: "true"
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
        with:
          rust-components: clippy,rustfmt
      - run: cargo fmt -- --check
      - run: cargo build --workspace
      - run: cargo clippy --workspace --all-targets

  test-x64:
    runs-on: [self-hosted, X64]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest
      - run: cargo build --workspace
      - run: cargo nextest run --workspace --profile ci --features integration -j $(($(nproc) / 4))
      - name: Upload test results to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: target/nextest/ci/junit.xml
          report_type: test_results

  test-arm64:
    runs-on: [self-hosted, Linux, kvm, kernel-build, ARM64]
    env:
      RUSTC_WRAPPER: ""
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest
      - run: cargo build --workspace
      - run: cargo nextest run --workspace --profile ci --features integration -j $(($(nproc) / 4))
      - name: Upload test results to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: target/nextest/ci/junit.xml
          report_type: test_results

  coverage:
    runs-on: [self-hosted, X64]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt,llvm-tools-preview
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov,cargo-nextest
      - run: cargo build --workspace
      - run: cargo llvm-cov nextest --workspace --profile ci --lcov --output-path lcov.info --features integration
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: lcov.info
