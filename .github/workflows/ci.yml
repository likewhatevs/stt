name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.sha }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  RUSTFLAGS: -Dwarnings
  RUSTC_WRAPPER: sccache

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: ./.github/actions/setup
      - run: cargo fmt -- --check
      - run: cargo clippy --workspace --all-targets

  test-x64:
    runs-on: [self-hosted, X64]
    strategy:
      fail-fast: false
      matrix:
        kernel-version: ['6.14', '7.0']
    env:
      KTSTR_GHA_CACHE: "1"
    steps:
      - uses: actions/checkout@v5
      - name: Provision Rust toolchain from rust-toolchain.toml
        run: rustup show active-toolchain || rustup toolchain install
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest
      - name: Install ktstr
        run: cargo install --path .
      - name: Cache kernel images
        uses: actions/cache@v5
        with:
          path: ~/.cache/ktstr/kernels
          key: ktstr-kernels-x64-${{ matrix.kernel-version }}-${{ hashFiles('ktstr.kconfig') }}
          restore-keys: ktstr-kernels-x64-${{ matrix.kernel-version }}-
      - name: Build test kernel
        run: cargo ktstr kernel build ${{ matrix.kernel-version }}
      - run: cargo ktstr test --kernel ${{ matrix.kernel-version }} -- --profile ci --features integration
      - name: Test statistics
        if: ${{ !cancelled() }}
        run: cargo ktstr stats
      - name: Upload test results to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: target/nextest/ci/junit.xml
          report_type: test_results

  test-arm64:
    runs-on: [self-hosted, Linux, kvm, kernel-build, ARM64]
    strategy:
      fail-fast: false
      matrix:
        kernel-version: ['6.14', '7.0']
    env:
      RUSTC_WRAPPER: ""
      KTSTR_GHA_CACHE: "1"
    steps:
      - uses: actions/checkout@v5
      - name: Provision Rust toolchain from rust-toolchain.toml
        run: rustup show active-toolchain || rustup toolchain install
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest
      - name: Install ktstr
        run: cargo install --path .
      - name: Cache kernel images
        uses: actions/cache@v5
        with:
          path: ~/.cache/ktstr/kernels
          key: ktstr-kernels-arm64-${{ matrix.kernel-version }}-${{ hashFiles('ktstr.kconfig') }}
          restore-keys: ktstr-kernels-arm64-${{ matrix.kernel-version }}-
      - name: Build test kernel
        run: cargo ktstr kernel build ${{ matrix.kernel-version }}
      - run: cargo ktstr test --kernel ${{ matrix.kernel-version }} -- --profile ci --features integration
      - name: Test statistics
        if: ${{ !cancelled() }}
        run: cargo ktstr stats
      - name: Upload test results to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: target/nextest/ci/junit.xml
          report_type: test_results

  coverage-x64:
    runs-on: [self-hosted, X64]
    env:
      RUSTC_WRAPPER: ""
      KTSTR_GHA_CACHE: "1"
    steps:
      - uses: actions/checkout@v5
      - name: Provision Rust toolchain from rust-toolchain.toml
        run: rustup show active-toolchain || rustup toolchain install
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov,cargo-nextest
      - name: Install ktstr
        run: cargo install --path .
      - name: Cache kernel images
        uses: actions/cache@v5
        with:
          path: ~/.cache/ktstr/kernels
          key: ktstr-kernels-x64-${{ hashFiles('ktstr.kconfig') }}
          restore-keys: ktstr-kernels-x64-
      - name: Build test kernel
        run: cargo ktstr kernel build
      - run: cargo ktstr coverage -- --profile ci --lcov --output-path lcov.info --features integration --exclude-from-report scx-ktstr
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: lcov.info
          flags: x64

  coverage-arm64:
    runs-on: [self-hosted, Linux, kvm, kernel-build, ARM64]
    env:
      RUSTC_WRAPPER: ""
      KTSTR_GHA_CACHE: "1"
    steps:
      - uses: actions/checkout@v5
      - name: Provision Rust toolchain from rust-toolchain.toml
        run: rustup show active-toolchain || rustup toolchain install
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov,cargo-nextest
      - name: Install ktstr
        run: cargo install --path .
      - name: Cache kernel images
        uses: actions/cache@v5
        with:
          path: ~/.cache/ktstr/kernels
          key: ktstr-kernels-arm64-${{ hashFiles('ktstr.kconfig') }}
          restore-keys: ktstr-kernels-arm64-
      - name: Build test kernel
        run: cargo ktstr kernel build
      - run: cargo ktstr coverage -- --profile ci --lcov --output-path lcov.info --features integration --exclude-from-report scx-ktstr
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: lcov.info
          flags: arm64
