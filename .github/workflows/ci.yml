name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -Dwarnings

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Harden apt against flaky mirrors
        run: |
          echo 'Acquire::ForceIPv4 "true";'        | sudo tee /etc/apt/apt.conf.d/99force-ipv4 >/dev/null
          echo 'Acquire::Retries "3";'              | sudo tee /etc/apt/apt.conf.d/99retries >/dev/null
          echo 'Acquire::http::Pipeline-Depth "0";' | sudo tee /etc/apt/apt.conf.d/99pipeline >/dev/null
          echo 'http://archive.ubuntu.com/ubuntu/'  | sudo tee /etc/apt/apt-mirrors.txt >/dev/null
          sudo sed -i -E \
            -e 's|https?://([a-z0-9-]+\.)*archive\.ubuntu\.com/ubuntu/?|http://archive.ubuntu.com/ubuntu/|g' \
            -e 's|https?://security\.ubuntu\.com/ubuntu/?|http://archive.ubuntu.com/ubuntu/|g' \
            /etc/apt/sources.list /etc/apt/sources.list.d/*.list /etc/apt/sources.list.d/*.sources 2>/dev/null || true

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang \
            llvm \
            libelf-dev \
            libcap-dev \
            gcc \
            make \
            pkg-config
          sudo apt-get install -y linux-headers-$(uname -r) || true

      - name: Build and install bpftool
        run: |
          git clone --recurse-submodules --depth 1 https://github.com/libbpf/bpftool.git
          make -C bpftool/src -j$(nproc)
          sudo make -C bpftool/src install

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt, llvm-tools-preview

      - run: cargo fmt -- --check

      - uses: Swatinem/rust-cache@v2

      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov,cargo-nextest

      - name: Build all workspace members
        run: cargo build --workspace

      - name: Clippy
        run: cargo clippy --workspace --all-targets

      - name: Detect KVM availability
        id: kvm
        run: |
          if [ -c /dev/kvm ] && [ -r /dev/kvm ] && [ -w /dev/kvm ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "::warning::KVM not available — VM and boot tests will be skipped"
          fi

      - name: Run tests (nextest, CI profile)
        run: |
          if [ "${{ steps.kvm.outputs.available }}" = "true" ]; then
            cargo nextest run --workspace --profile ci
          else
            cargo nextest run --workspace --profile ci \
              -E 'not (test(boot_kernel) | test(bench_boot) | test(vmm::kvm::) | test(vmm::tests::ap_mp) | test(vmm::tests::kvm_) | test(vmm::tests::immediate_exit) | test(vmm::tests::vcpu_thread_kick) | test(vmm::boot::tests::setup_fpu_with_kvm) | test(vmm::boot::tests::setup_msrs_with_kvm) | test(vmm::boot::tests::setup_regs_with_kvm) | test(vmm::boot::tests::setup_sregs_with_kvm) | test(vmm::boot::tests::setup_lapic))'
          fi

      - name: Run coverage (cargo-llvm-cov)
        run: |
          if [ "${{ steps.kvm.outputs.available }}" = "true" ]; then
            cargo llvm-cov --workspace --lcov --output-path lcov.info
          else
            cargo llvm-cov --workspace --lcov --output-path lcov.info \
              -- --skip boot_kernel --skip bench_boot
          fi

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: lcov.info

      - name: Upload nextest JUnit results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: junit-results
          path: target/nextest/ci/junit.xml
          if-no-files-found: ignore
