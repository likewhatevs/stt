# All commands live in the justfile so they are runnable locally via
# `just <recipe>`.  The YAML handles only checkout, toolchain, cache, and
# tool installation; every `run:` step calls a justfile recipe.
name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.sha }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  KTSTR_GHA_CACHE: "1"
  RUSTC_WRAPPER: sccache

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: ./.github/actions/setup
      - run: just lint

  test-x64:
    runs-on: [ktstr-x64]
    strategy:
      fail-fast: false
      matrix:
        kernel-version: ['6.14', '7.0']
    steps:
      - uses: actions/checkout@v5
      - name: Provision Rust toolchain
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          echo "${HOME}/.cargo/bin" >> "${GITHUB_PATH}"
      - run: cargo install just
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest
      - run: just kernel-build ${{ matrix.kernel-version }}
      - run: just test ${{ matrix.kernel-version }}
      - if: ${{ !cancelled() }}
        run: just sccache-stats
      - if: ${{ !cancelled() }}
        run: just stats
      - name: Upload test results to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: target/nextest/ci/junit.xml
          report_type: test_results

  test-arm64:
    runs-on: [ktstr-arm64]
    strategy:
      fail-fast: false
      matrix:
        kernel-version: ['6.14', '7.0']
    steps:
      - uses: actions/checkout@v5
      - name: Provision Rust toolchain
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          echo "${HOME}/.cargo/bin" >> "${GITHUB_PATH}"
      - run: cargo install just
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest
      - run: just kernel-build ${{ matrix.kernel-version }}
      - run: just test ${{ matrix.kernel-version }}
      - if: ${{ !cancelled() }}
        run: just sccache-stats
      - if: ${{ !cancelled() }}
        run: just stats
      - name: Upload test results to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: target/nextest/ci/junit.xml
          report_type: test_results

  coverage-x64:
    runs-on: [ktstr-x64]
    steps:
      - uses: actions/checkout@v5
      - name: Provision Rust toolchain
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          echo "${HOME}/.cargo/bin" >> "${GITHUB_PATH}"
      - run: cargo install just
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov,cargo-nextest
      - run: just kernel-build
      - run: just coverage
      - if: ${{ !cancelled() }}
        run: just sccache-stats
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: lcov.info
          flags: x64

  coverage-arm64:
    runs-on: [ktstr-arm64]
    steps:
      - uses: actions/checkout@v5
      - name: Provision Rust toolchain
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          echo "${HOME}/.cargo/bin" >> "${GITHUB_PATH}"
      - run: cargo install just
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov,cargo-nextest
      - run: just kernel-build
      - run: just coverage
      - if: ${{ !cancelled() }}
        run: just sccache-stats
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: lcov.info
          flags: arm64
