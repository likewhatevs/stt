name: Pages

on:
  push:
    branches: [main]

permissions:
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Harden apt against flaky mirrors
        run: |
          echo 'Acquire::ForceIPv4 "true";'        | sudo tee /etc/apt/apt.conf.d/99force-ipv4 >/dev/null
          echo 'Acquire::Retries "3";'              | sudo tee /etc/apt/apt.conf.d/99retries >/dev/null
          echo 'Acquire::http::Pipeline-Depth "0";' | sudo tee /etc/apt/apt.conf.d/99pipeline >/dev/null
          echo 'http://archive.ubuntu.com/ubuntu/'  | sudo tee /etc/apt/apt-mirrors.txt >/dev/null
          sudo sed -i -E \
            -e 's|https?://([a-z0-9-]+\.)*archive\.ubuntu\.com/ubuntu/?|http://archive.ubuntu.com/ubuntu/|g' \
            -e 's|https?://security\.ubuntu\.com/ubuntu/?|http://archive.ubuntu.com/ubuntu/|g' \
            /etc/apt/sources.list /etc/apt/sources.list.d/*.list /etc/apt/sources.list.d/*.sources 2>/dev/null || true

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang \
            llvm \
            libelf-dev \
            libcap-dev \
            gcc \
            make \
            pkg-config
          sudo apt-get install -y linux-headers-$(uname -r) || true

      - name: Build and install bpftool
        run: |
          git clone --recurse-submodules --depth 1 https://github.com/libbpf/bpftool.git
          make -C bpftool/src -j$(nproc)
          sudo make -C bpftool/src install

      - uses: dtolnay/rust-toolchain@stable

      - uses: taiki-e/install-action@mdbook

      - name: Build guide
        run: mdbook build doc/guide

      - name: Build API docs
        run: cargo doc --workspace --no-deps
        env:
          RUSTDOCFLAGS: --enable-index-page -Zunstable-options

      - name: Assemble site
        run: |
          mkdir -p _site/guide _site/api
          cp -r doc/guide/book/* _site/guide/
          cp -r target/doc/* _site/api/
          cat > _site/index.html <<'HTML'
          <!DOCTYPE html>
          <meta http-equiv="refresh" content="0; url=guide/">
          HTML

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - id: deploy
        uses: actions/deploy-pages@v4
