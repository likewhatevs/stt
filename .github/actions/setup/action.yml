name: Setup ktstr build environment
description: Install clang-20, bpftool, sccache, and optionally KVM + debug symbols. Rust toolchain is eagerly provisioned from rust-toolchain.toml via `rustup show active-toolchain || rustup toolchain install` so the install cost is paid in this action rather than on the first cargo invocation.

inputs:
  tools:
    description: Extra cargo tools to install via taiki-e/install-action
    default: ''
  enable-kvm:
    description: Set up KVM access and install kernel debug symbols
    default: 'false'

runs:
  using: composite
  steps:
    - name: Harden apt against flaky mirrors
      shell: bash
      run: |
        echo 'Acquire::ForceIPv4 "true";'        | sudo tee /etc/apt/apt.conf.d/99force-ipv4 >/dev/null
        echo 'Acquire::Retries "3";'              | sudo tee /etc/apt/apt.conf.d/99retries >/dev/null
        echo 'Acquire::http::Pipeline-Depth "0";' | sudo tee /etc/apt/apt.conf.d/99pipeline >/dev/null
        echo 'http://archive.ubuntu.com/ubuntu/'  | sudo tee /etc/apt/apt-mirrors.txt >/dev/null
        sudo sed -i -E \
          -e 's|https?://([a-z0-9-]+\.)*archive\.ubuntu\.com/ubuntu/?|http://archive.ubuntu.com/ubuntu/|g' \
          -e 's|https?://security\.ubuntu\.com/ubuntu/?|http://archive.ubuntu.com/ubuntu/|g' \
          /etc/apt/sources.list /etc/apt/sources.list.d/*.list /etc/apt/sources.list.d/*.sources 2>/dev/null || true

    - name: Install system dependencies
      shell: bash
      run: |
        wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key | sudo apt-key add -
        echo "deb http://apt.llvm.org/$(lsb_release -cs)/ llvm-toolchain-$(lsb_release -cs)-20 main" \
          | sudo tee /etc/apt/sources.list.d/llvm-20.list
        sudo apt-get update
        sudo apt-get install -y \
          clang-20 \
          llvm-20 \
          gcc \
          make \
          pkg-config \
          autoconf \
          automake \
          libtool \
          gettext \
          autopoint \
          libbpf-dev \
          libcap-dev \
          libelf-dev \
          binutils-dev \
          zlib1g-dev
        sudo apt-get install -y linux-headers-$(uname -r) || true
        sudo update-alternatives --install /usr/bin/clang clang /usr/bin/clang-20 200
        sudo update-alternatives --set clang /usr/bin/clang-20
        sudo update-alternatives --install /usr/bin/llvm-strip llvm-strip /usr/bin/llvm-strip-20 200
        sudo update-alternatives --set llvm-strip /usr/bin/llvm-strip-20
        sudo update-alternatives --install /usr/bin/llvm-config llvm-config /usr/bin/llvm-config-20 200
        sudo update-alternatives --set llvm-config /usr/bin/llvm-config-20

    - name: Build and install bpftool
      shell: bash
      run: |
        git clone --recurse-submodules --depth 1 https://github.com/libbpf/bpftool.git
        make -C bpftool/src -j$(nproc)
        sudo make -C bpftool/src install

    - name: Provision Rust toolchain from rust-toolchain.toml
      shell: bash
      run: |
        rustup toolchain install
        rustup component add rustfmt clippy llvm-tools-preview
        echo "$HOME/.cargo/bin" >> $GITHUB_PATH

    - uses: mozilla-actions/sccache-action@v0.0.9
      with:
        disable_annotations: true

    - name: Install cargo tools
      if: inputs.tools != ''
      uses: taiki-e/install-action@v2
      with:
        tool: ${{ inputs.tools }}

    - name: Install kernel debug symbols
      if: inputs.enable-kvm == 'true'
      shell: bash
      run: |
        echo "deb http://ddebs.ubuntu.com $(lsb_release -cs) main restricted universe multiverse
        deb http://ddebs.ubuntu.com $(lsb_release -cs)-updates main restricted universe multiverse" \
          | sudo tee /etc/apt/sources.list.d/ddebs.list
        sudo apt-key adv --keyserver keyserver.ubuntu.com --recv-keys F2EDC64DC5AEE1F6B9C621F0C8CAB6595FDFF622 2>/dev/null || true
        sudo apt-get update -o Dir::Etc::sourcelist=/etc/apt/sources.list.d/ddebs.list -o Dir::Etc::sourceparts=- || true
        sudo apt-get install -y "linux-image-$(uname -r)-dbgsym" 2>/dev/null || \
          sudo apt-get install -y "linux-image-unsigned-$(uname -r)-dbgsym" 2>/dev/null || true

    - name: Enable KVM access
      if: inputs.enable-kvm == 'true'
      shell: bash
      run: |
        echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
          | sudo tee /etc/udev/rules.d/99-kvm4all.rules
        sudo udevadm control --reload-rules
        sudo udevadm trigger --name-match=kvm
        sudo chmod a+r /boot/vmlinuz-* 2>/dev/null || true
        sudo sysctl -w kernel.kptr_restrict=0
