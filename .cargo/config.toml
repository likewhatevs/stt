[build]
rustflags = ["-D", "warnings"]

# gemm 0.19.0 emits fp16 NEON inline asm unconditionally; the
# assembler rejects it unless the target feature is enabled.
# gemm does runtime CPU detection before calling fp16 paths.
[target.aarch64-unknown-linux-gnu]
rustflags = ["-D", "warnings", "-C", "target-feature=+fp16"]
