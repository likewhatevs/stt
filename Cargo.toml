[workspace]
members = [".", "ktstr-macros", "scx-ktstr"]

[workspace.package]
edition = "2024"
rust-version = "1.88"
license = "GPL-2.0-only"
repository = "https://github.com/likewhatevs/ktstr"

[package]
name = "ktstr"
version = "0.1.0"
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
description = "Test harness for Linux process schedulers"
readme = "README.md"
keywords = ["sched_ext", "scheduler", "testing", "bpf", "linux"]
categories = ["development-tools::testing"]
documentation = "https://likewhatevs.github.io/ktstr/api/ktstr/"
exclude = [".build-cache/", "doc/guide/book/", ".github/", ".githooks/", ".config/"]

[dependencies]
anyhow = "1"
clap = { version = "4", features = ["derive"], optional = true }
clap_complete = { version = "4", optional = true }
crc32fast = "1.5"
gix = { version = "0.81", default-features = false, features = ["sha1", "blocking-network-client", "blocking-http-transport-reqwest-rust-tls", "worktree-mutation", "status"], optional = true }
reqwest = { version = "0.13", features = ["blocking"], optional = true }
tar = { version = "0.4", optional = true }
tempfile = { version = "3", optional = true }
xz2 = { version = "0.1", optional = true }
opendal = { version = "0.55", default-features = false, features = ["services-ghac"], optional = true }
tokio = { version = "1", features = ["rt"], optional = true }
zstd = { version = "0.13", features = ["zstdmt"], optional = true }
lz4_flex = { version = "0.12", features = ["frame"] }
flate2 = "1"
ctor = "0.8"
libc = "0.2"
nix = { version = "0.31", features = ["feature", "fs", "mount", "poll", "process", "reboot", "sched", "signal", "term"] }
blazesym = { version = "0.2", features = ["dwarf"] }
rand = "0.10"
rmesg = { version = "1", default-features = false, features = ["sync"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
btf-rs = "1.1.1"
kvm-bindings = { version = "0.14", features = ["fam-wrappers"] }
kvm-ioctls = "0.24"
libbpf-rs = { version = "0.26", features = ["vendored"] }
libbpf-sys = { version = "1.6", features = ["vendored"] }
linux-loader = { version = "0.13", features = ["bzimage", "elf", "pe"] }
vm-fdt = "0.3"
vm-memory = { version = "=0.17.1", features = ["backend-mmap"] }
vmm-sys-util = "0.15"
cpio = "0.4.1"
vm-superio = "0.8.1"
parking_lot = "0.12"
zerocopy = { version = "0.8.48", features = ["derive"] }
polars = { version = "0.53.0", default-features = false, features = ["lazy", "describe"] }
linkme = "0.3"
ktstr-macros = { version = "0.1.0", path = "ktstr-macros" }
goblin = { version = "0.10.5", features = ["elf64"] }
rayon = "1"
object = { version = "0.36", default-features = false, features = ["build", "std", "elf"] }

[profile.release]
lto = "thin"

[features]
default = ["cli"]
integration = []
fetch = ["dep:gix", "dep:reqwest", "dep:tar", "dep:tempfile", "dep:xz2"]
cli = ["fetch", "dep:clap", "dep:clap_complete"]
gha-cache = ["dep:opendal", "dep:tokio", "dep:tar", "dep:tempfile", "dep:zstd"]
full = ["cli", "gha-cache"]

[lints.rust]
unexpected_cfgs = { level = "warn", check-cfg = ['cfg(coverage)', 'cfg(coverage_nightly)'] }

[dev-dependencies]
assert_cmd = "2"
predicates = "3"
tempfile = "3"

[build-dependencies]
cc = "1"
flate2 = "1"
gix = { version = "0.81", default-features = false, features = ["sha1"] }
libbpf-cargo = "0.26"
reqwest = { version = "0.13", features = ["blocking"] }
tar = "0.4"

[[bin]]
name = "ktstr"
path = "src/bin/ktstr.rs"
required-features = ["cli"]

[[bin]]
name = "cargo-ktstr"
path = "src/bin/cargo-ktstr.rs"
required-features = ["cli"]

[[test]]
name = "ktstr_sched_tests"

[[test]]
name = "scenario_coverage"

[[test]]
name = "assert_gate_matrix"

[[test]]
name = "cargo_ktstr_cli"

[[test]]
name = "verifier_pipeline"
