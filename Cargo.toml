[workspace]
members = [".", "stt-macros", "stt-sched", "cargo-stt"]

[package]
name = "stt"
version = "0.1.0"
edition = "2024"
rust-version = "1.88"
license = "GPL-2.0-only"
repository = "https://github.com/likewhatevs/stt"
description = "Test harness for Linux process schedulers"
readme = "README.md"
keywords = ["sched_ext", "scheduler", "testing", "bpf", "linux"]
categories = ["command-line-utilities", "development-tools::testing"]
publish = false

[dependencies]
anyhow = "1"
clap = { version = "4", features = ["derive", "unicode", "wrap_help"] }
crc32fast = "1.5"
ctrlc = "3"
console = "0.16"
flate2 = "1"
ctor = "0.8"
gix = "0.81"
libc = "0.2"
nix = { version = "0.31", features = ["sched", "signal", "process"] }
blazesym = { version = "0.2", features = ["dwarf"] }
rand = "0.10"
rmesg = { version = "1", default-features = false, features = ["sync"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
btf-rs = "1.1.1"
kvm-bindings = { version = "0.14", features = ["fam-wrappers"] }
kvm-ioctls = "0.24"
libbpf-rs = { version = "0.26", features = ["vendored"] }
linux-loader = { version = "0.13", features = ["bzimage", "elf", "pe"] }
vm-fdt = "0.3"
vm-memory = { version = "=0.17.1", features = ["backend-mmap"] }
vmm-sys-util = "0.15"
cpio = "0.4.1"
vm-superio = "0.8.1"
zerocopy = { version = "0.8.48", features = ["derive"] }
polars = { version = "0.53.0", default-features = false, features = ["lazy", "describe"] }
object = { version = "0.39.0", features = ["read"] }
linkme = "0.3"
stt-macros = { path = "stt-macros" }
visibility = "0.1"

[features]
integration = []

[lints.rust]
unexpected_cfgs = { level = "warn", check-cfg = ['cfg(coverage)', 'cfg(coverage_nightly)'] }

[build-dependencies]
libbpf-cargo = "0.26"
