# ── Profiles ──────────────────────────────────────────────────────────

# ResourceContention SKIPs cleanly at the macro layer so retries
# only fire on true transient flakes, which typically resolve by
# retry 2-3. max-delay=5s keeps the per-failure budget tight:
# worst case 8 retries × 5s = 40s of delay (plus test execution).
[profile.default]
slow-timeout = { period = "60s", terminate-after = 2 }
retries = { backoff = "exponential", count = 5, delay = "1s", jitter = true, max-delay = "3s" }
test-threads = "num-cpus"

[profile.default.junit]
path = "junit.xml"

[profile.ci]
slow-timeout = { period = "90s", terminate-after = 3 }
retries = { backoff = "exponential", count = 30, delay = "1s", jitter = true, max-delay = "3s" }
failure-output = "final"
fail-fast = false

[profile.ci.junit]
path = "junit.xml"

# CI overrides — mirrors profile.default.overrides. nextest does not
# inherit overrides across profiles, so every override that should
# apply under --profile ci must be duplicated here.

[[profile.ci.overrides]]
filter = "test(boot_kernel) | test(bench_boot)"
slow-timeout = { period = "180s", terminate-after = 3 }

[[profile.ci.overrides]]
filter = "test(verifier_)"
slow-timeout = { period = "180s", terminate-after = 3 }

[[profile.ci.overrides]]
filter = "test(demo_)"
slow-timeout = { period = "120s", terminate-after = 3 }
retries = 6

[[profile.ci.overrides]]
filter = "test(gauntlet/)"
slow-timeout = { period = "120s", terminate-after = 3 }

[[profile.ci.overrides]]
filter = "test(compile_fail)"
slow-timeout = { period = "180s", terminate-after = 3 }

[[profile.ci.overrides]]
filter = "test(cached_releases_with_non_singleton_bypasses_cache)"
slow-timeout = { period = "240s", terminate-after = 3 }
retries = 6

[[profile.ci.overrides]]
filter = "test(eevdf_)"
slow-timeout = { period = "75s", terminate-after = 3 }
retries = 6

[[profile.ci.overrides]]
filter = "test(model_loaded_)"
slow-timeout = { period = "600s", terminate-after = 3 }
retries = 6

[[profile.ci.overrides]]
filter = "test(shell_exec_)"
test-group = "vm-cli"
threads-required = 1

[[profile.ci.overrides]]
filter = "test(sched_perf_)"
test-group = "vm-perf"
threads-required = 1

[[profile.ci.overrides]]
filter = "test(pathology_alu_hot_iterates) | test(alu_hot_vec512)"
test-group = "alu-vec512"
threads-required = 1

[[profile.ci.overrides]]
filter = "test(acquire_llc_plan_) | test(resource_lock_exclusive_) | test(resource_lock_shared_) | test(resource_lock_contention_returns_unavailable) | test(resource_lock_all_or_nothing) | test(resource_lock_service_cpu_contention) | test(resource_lock_empty_llc_indices) | test(resource_lock_release_on_drop) | test(cpu_lock_window_) | test(cpu_lock_acquire_) | test(cpu_lock_llc_shared_protection) | test(cpu_lock_contention_slides_window) | test(cpu_lock_zero_count)"
test-group = "llc-lock"
threads-required = 1

[profile.quick]
# Usage: cargo nextest run --profile quick
slow-timeout = { period = "10s", terminate-after = 2 }

# ── Overrides ─────────────────────────────────────────────────────────

# Boot tests under coverage instrumentation (llvm-cov) are 5-10x slower.
[[profile.default.overrides]]
filter = "test(boot_kernel) | test(bench_boot)"
slow-timeout = { period = "180s", terminate-after = 2 }

# Verifier tests: internal 120s timeout, nextest must exceed that.
[[profile.default.overrides]]
filter = "test(verifier_)"
slow-timeout = { period = "180s", terminate-after = 2 }

# Demo tests: exploration/failure scenarios, should not retry.
[[profile.default.overrides]]
filter = "test(demo_)"
slow-timeout = { period = "120s", terminate-after = 2 }
retries = 0

# Gauntlet tests: topology x flags matrix, ignored by default.
# Run with: cargo ktstr test -- --run-ignored ignored-only -E 'test(gauntlet/)'
[[profile.default.overrides]]
filter = "test(gauntlet/)"
slow-timeout = { period = "120s", terminate-after = 2 }

# Compile-fail tests: trybuild compiles the dependency tree on first run.
[[profile.default.overrides]]
filter = "test(compile_fail)"
slow-timeout = { period = "180s", terminate-after = 2 }

# cached_releases bypass test: drives a localhost mock through the
# fetch.rs URL-injection seam. Observed exhausting the ci profile's
# 270s slow-timeout budget (90s × 3) on ARM64 runners. The test
# itself is bounded by a 5s reqwest timeout per attempt, so the only
# way to hit 270s is repeated retries — each retry replays the same
# RELEASES_CACHE OnceLock state and the same TcpListener::bind path,
# so a failure is never transient. retries=0 keeps a single attempt
# and surfaces any genuine regression as a fast failure rather than
# letting the retry storm consume the timeout budget. The 240s × 2
# slow-timeout matches the boot_kernel ceiling and gives the slowest
# observed ARM64 runner room to complete the bind+accept+request
# round-trip without nextest pre-empting it.
[[profile.default.overrides]]
filter = "test(cached_releases_with_non_singleton_bypasses_cache)"
slow-timeout = { period = "240s", terminate-after = 2 }
retries = 0

# EEVDF tests: no sched_ext scheduler attached, so VM lifecycle is
# bounded by vm_timeout_from_entry (max(watchdog, duration, 1s) + 45s)
# plus VM setup overhead. 75s gives a margin above that ceiling so
# nextest does not race the watchdog. retries=0 because a watchdog
# timeout is never transient — re-running just burns the same time.
[[profile.default.overrides]]
filter = "test(eevdf_)"
slow-timeout = { period = "75s", terminate-after = 2 }
retries = 0

# Model-loaded tests: real CPU inference on the 2.55 GiB Qwen3 GGUF
# runs the SAMPLE_LEN-token loop, which routinely takes 2-5 minutes
# per call on host CPU. The default 60s × 2 budget terminates these
# long before they finish; the override budgets 600s × 2 (20 min
# total) so a slow CI runner with greedy sampling on a 64-core box
# still completes inside the cap.
#
# Two populations match this filter:
#   * Unit tests in `src/test_support/model.rs` are `#[ignore]`'d by
#     default and only run via `--run-ignored=only` — the override
#     applies to ignored runs the same way nextest applies any other
#     override.
#   * The integration test
#     `tests/llm_extract_e2e_test.rs::model_loaded_llm_extract_schbench`
#     runs by default; the host-side `host_side_llm_extract` path
#     (`src/test_support/eval.rs`) loads the GGUF post-VM-exit and
#     runs inference on host CPU. The 2-5 minute inference window
#     alone exceeds the 60s default budget on EVERY run regardless
#     of cache state — the 600s override is required for warm-cache
#     runs too. A cold cache additionally pays the GGUF download cost
#     on top of that. retries=0: inference time is deterministic, so
#     a timeout-killed run is never transient.
[[profile.default.overrides]]
filter = "test(model_loaded_)"
slow-timeout = { period = "600s", terminate-after = 2 }
retries = 0

# ── vm-cli ───────────────────────────────────────────────────────────
[test-groups.vm-cli]
max-threads = 1

# Serialize shell_exec_* tests (CLI-spawned VMs) to avoid CPU-lock
# contention with concurrent in-process VM tests — acquire_cpu_locks
# fast-fails when peers hold all locks.
[[profile.default.overrides]]
filter = "test(shell_exec_)"
test-group = "vm-cli"
threads-required = 1

# ── vm-perf ──────────────────────────────────────────────────────────
# Caps concurrent perf-sensitive VM tests at 8 on high-core hosts.
# On hosts with fewer than 8 effective test-threads, nextest's global
# parallelism is the binding limit, so no explicit lower floor is
# needed.
[test-groups.vm-perf]
max-threads = 8

[[profile.default.overrides]]
filter = "test(sched_perf_)"
test-group = "vm-perf"
threads-required = 1

# ── alu-vec512 ───────────────────────────────────────────────────────
# AVX-512 / AMX execution triggers package-wide frequency throttle on
# x86: vector-heavy code drops the package's all-core frequency
# (license-2/license-3 transitions in skylake-X-and-later) and AMX
# tile loads add tens-of-microseconds on TILELOAD/TILEZERO. A
# concurrent test running on the same socket sees iteration latency
# from the throttled clock, not from the scheduler — and any
# scheduler-latency assertion in the neighbouring test becomes
# noisy. Serialize tests whose AluHot path may resolve to
# `AluWidth::Vec512` or `AluWidth::Amx` so the throttle envelope is
# deterministic.
[test-groups.alu-vec512]
max-threads = 1

# `pathology_alu_hot_iterates` runs `AluWidth::Widest`, which
# `resolve_alu_width` (src/workload.rs) downgrades to Vec512 on
# avx512f hosts (Vec256/Vec128/Scalar otherwise). AMX is not
# probed on stable Rust — `AluWidth::Amx` always downgrades to
# the widest stable-detectable variant. The `alu_hot_vec512`
# arm gives future Vec512 SIMD-intrinsic tests a stable naming
# hook so they auto-serialize without a config change.
[[profile.default.overrides]]
filter = "test(pathology_alu_hot_iterates) | test(alu_hot_vec512)"
test-group = "alu-vec512"
threads-required = 1

# ── llc-lock ─────────────────────────────────────────────────────────
# Serialize tests that touch `/tmp/ktstr-llc-*.lock` or
# `/tmp/ktstr-cpu-*.lock` at shared indices. Parallel runs race on
# flock state, producing EWOULDBLOCK outcomes depending on thread
# ordering and flaking the Acquired/Unavailable assertions. With
# max-threads = 1 the whole group walks sequentially through the
# host's lock pool.
[test-groups.llc-lock]
max-threads = 1

[[profile.default.overrides]]
filter = "test(acquire_llc_plan_) | test(resource_lock_exclusive_) | test(resource_lock_shared_) | test(resource_lock_contention_returns_unavailable) | test(resource_lock_all_or_nothing) | test(resource_lock_service_cpu_contention) | test(resource_lock_empty_llc_indices) | test(resource_lock_release_on_drop) | test(cpu_lock_window_) | test(cpu_lock_acquire_) | test(cpu_lock_llc_shared_protection) | test(cpu_lock_contention_slides_window) | test(cpu_lock_zero_count)"
test-group = "llc-lock"
threads-required = 1

# Quick profile: short-circuit long-running tests.
[[profile.quick.overrides]]
filter = "test(boot_kernel) | test(bench_boot)"
slow-timeout = { period = "60s", terminate-after = 1 }

[[profile.quick.overrides]]
filter = "test(cover_) | test(neg_)"
slow-timeout = { period = "60s", terminate-after = 2 }
