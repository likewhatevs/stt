# ── Profiles ──────────────────────────────────────────────────────────

[profile.default]
slow-timeout = { period = "60s", terminate-after = 2 }
retries = { backoff = "exponential", count = 3, delay = "10s", jitter = true, max-delay = "60s" }
test-threads = "num-cpus"

[profile.default.junit]
path = "junit.xml"

[profile.ci]
slow-timeout = { period = "90s", terminate-after = 3 }
retries = { backoff = "exponential", count = 6, delay = "5s", jitter = true, max-delay = "60s" }
failure-output = "final"
fail-fast = false

[profile.ci.junit]
path = "junit.xml"

[profile.quick]
# Usage: cargo nextest run --profile quick
slow-timeout = { period = "10s", terminate-after = 2 }

# ── Overrides ─────────────────────────────────────────────────────────

# Boot tests under coverage instrumentation (llvm-cov) are 5-10x slower.
[[profile.default.overrides]]
filter = "test(boot_kernel) | test(bench_boot)"
slow-timeout = { period = "180s", terminate-after = 2 }

# Verifier tests: internal 120s timeout, nextest must exceed that.
[[profile.default.overrides]]
filter = "test(verifier_)"
slow-timeout = { period = "180s", terminate-after = 2 }

# Demo tests: exploration/failure scenarios, should not retry.
[[profile.default.overrides]]
filter = "test(demo_)"
slow-timeout = { period = "120s", terminate-after = 2 }
retries = 0

# Gauntlet tests: topology x flags matrix, ignored by default.
# Run with: cargo nextest run --run-ignored ignored-only -E 'test(gauntlet/)'
[[profile.default.overrides]]
filter = "test(gauntlet/)"
slow-timeout = { period = "120s", terminate-after = 2 }

# Compile-fail tests: trybuild compiles the dependency tree on first run.
[[profile.default.overrides]]
filter = "test(compile_fail)"
slow-timeout = { period = "180s", terminate-after = 2 }

# EEVDF tests: no sched_ext scheduler attached, so VM lifecycle is
# bounded by the 60s host watchdog at `runtime.rs::KTSTR_VM_TIMEOUT`
# plus VM setup overhead. 75s gives a margin above that ceiling so
# nextest does not race the watchdog. retries=0 because a watchdog
# timeout is never transient — re-running just burns the same time.
[[profile.default.overrides]]
filter = "test(eevdf_)"
slow-timeout = { period = "75s", terminate-after = 2 }
retries = 0

# Model-loaded tests: real CPU inference on the 2.44 GiB Qwen3 GGUF
# runs the SAMPLE_LEN-token loop, which routinely takes 2-5 minutes
# per call on host CPU. The default 60s × 2 budget terminates these
# long before they finish; the override budgets 600s × 2 (20 min
# total) so a slow CI runner with greedy sampling on a 64-core box
# still completes inside the cap.
#
# Two populations match this filter:
#   * Unit tests in `src/test_support/model.rs` are `#[ignore]`'d by
#     default and only run via `--run-ignored=only` — the override
#     applies to ignored runs the same way nextest applies any other
#     override.
#   * The integration test
#     `tests/llm_extract_e2e_test.rs::model_loaded_llm_extract_schbench`
#     runs by default; the host-side `host_side_llm_extract` path
#     (`src/test_support/eval.rs`) loads the GGUF post-VM-exit and
#     runs inference on host CPU. The 2-5 minute inference window
#     alone exceeds the 60s default budget on EVERY run regardless
#     of cache state — the 600s override is required for warm-cache
#     runs too. A cold cache additionally pays the GGUF download cost
#     on top of that. retries=0: inference time is deterministic, so
#     a timeout-killed run is never transient.
[[profile.default.overrides]]
filter = "test(model_loaded_)"
slow-timeout = { period = "600s", terminate-after = 2 }
retries = 0

# ── vm-cli ───────────────────────────────────────────────────────────
[test-groups.vm-cli]
max-threads = 1

# Serialize shell_exec_* tests (CLI-spawned VMs) to avoid CPU-lock
# contention with concurrent in-process VM tests — acquire_cpu_locks
# fast-fails when peers hold all locks.
[[profile.default.overrides]]
filter = "test(shell_exec_)"
test-group = "vm-cli"
threads-required = 1

# ── vm-perf ──────────────────────────────────────────────────────────
# Caps concurrent perf-sensitive VM tests at 8 on high-core hosts.
# On hosts with fewer than 8 effective test-threads, nextest's global
# parallelism is the binding limit, so no explicit lower floor is
# needed.
[test-groups.vm-perf]
max-threads = 8

[[profile.default.overrides]]
filter = "test(sched_perf_)"
test-group = "vm-perf"
threads-required = 1

# ── llc-lock ─────────────────────────────────────────────────────────
# Serialize tests that touch `/tmp/ktstr-llc-*.lock` or
# `/tmp/ktstr-cpu-*.lock` at shared indices. Parallel runs race on
# flock state, producing EWOULDBLOCK outcomes depending on thread
# ordering and flaking the Acquired/Unavailable assertions. With
# max-threads = 1 the whole group walks sequentially through the
# host's lock pool.
[test-groups.llc-lock]
max-threads = 1

[[profile.default.overrides]]
filter = "test(acquire_llc_plan_) | test(resource_lock_exclusive_) | test(resource_lock_shared_) | test(resource_lock_contention_returns_unavailable) | test(resource_lock_all_or_nothing) | test(resource_lock_service_cpu_contention) | test(resource_lock_empty_llc_indices) | test(resource_lock_release_on_drop) | test(cpu_lock_window_) | test(cpu_lock_acquire_) | test(cpu_lock_llc_shared_protection) | test(cpu_lock_contention_slides_window) | test(cpu_lock_zero_count)"
test-group = "llc-lock"
threads-required = 1

# Quick profile: short-circuit long-running tests.
[[profile.quick.overrides]]
filter = "test(boot_kernel) | test(bench_boot)"
slow-timeout = { period = "60s", terminate-after = 1 }

[[profile.quick.overrides]]
filter = "test(cover_) | test(neg_)"
slow-timeout = { period = "60s", terminate-after = 2 }
