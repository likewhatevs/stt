# ── Profiles ──────────────────────────────────────────────────────────

[profile.default]
# Most tests are fast unit tests; 30s is generous.
slow-timeout = { period = "30s", terminate-after = 2 }
# Run all tests with generous parallelism.
test-threads = "num-cpus"

[profile.ci]
# CI should surface slow tests early and hard-kill hangs.
slow-timeout = { period = "20s", terminate-after = 3 }
retries = 0
fail-fast = false

[profile.ci.junit]
path = "junit.xml"

[profile.quick]
# Skip boot tests entirely via filter; run only fast tests.
# Usage: cargo nextest run --profile quick
slow-timeout = { period = "10s", terminate-after = 2 }

# ── Overrides ─────────────────────────────────────────────────────────

# Boot tests: long timeout, retry in CI.
# Coverage instrumentation (llvm-cov) makes VM boots 5-10x slower,
# so the budget must accommodate the slowest observed coverage run.
[[profile.default.overrides]]
filter = "test(boot_kernel) | test(bench_boot)"
slow-timeout = { period = "180s", terminate-after = 2 }

[[profile.ci.overrides]]
filter = "test(boot_kernel) | test(bench_boot)"
slow-timeout = { period = "60s", terminate-after = 2 }
retries = 1

# KVM tests: create VMs but don't boot kernels. Moderate timeout.
[[profile.default.overrides]]
filter = "test(vmm::kvm::) | test(vmm::tests::ap_mp) | test(vmm::tests::kvm_) | test(vmm::tests::immediate_exit) | test(vmm::tests::vcpu_thread_kick) | test(vmm::boot::tests::setup_fpu_with_kvm) | test(vmm::boot::tests::setup_msrs_with_kvm) | test(vmm::boot::tests::setup_regs_with_kvm) | test(vmm::boot::tests::setup_sregs_with_kvm) | test(vmm::boot::tests::setup_lapic)"
slow-timeout = { period = "15s", terminate-after = 2 }

# Coverage tests: boot full VMs with coverage-instrumented binaries.
[[profile.default.overrides]]
filter = "test(cover_)"
slow-timeout = { period = "60s", terminate-after = 2 }

# VM-booting integration tests: CI runners are shared and noisy.
# Two retries (three total attempts) absorb transient host load
# that causes rq_clock stall false positives.
[[profile.ci.overrides]]
filter = "test(cover_) | test(sched_)"
slow-timeout = { period = "60s", terminate-after = 2 }
retries = 2

# Negative/auto-repro tests: boot two VMs (crash + repro).
[[profile.ci.overrides]]
filter = "test(neg_)"
slow-timeout = { period = "60s", terminate-after = 2 }
retries = 2

# Negative/auto-repro tests: boot two VMs (main + repro). Need more
# time than single-VM coverage tests.
[[profile.default.overrides]]
filter = "test(neg_)"
slow-timeout = { period = "60s", terminate-after = 2 }
retries = 1

# VM-booting integration tests: retry once on host scheduling flakiness.
[[profile.default.overrides]]
filter = "test(sched_) | test(cover_)"
retries = 1

# Demo tests: showcase tests run manually (--run-ignored ignored-only).
# Auto-repro demos boot two VMs sequentially; verifier demos load BPF.
[[profile.default.overrides]]
filter = "test(demo_)"
slow-timeout = { period = "120s", terminate-after = 2 }
retries = 0

# Gauntlet tests: topology x flags matrix, ignored by default.
# Run with: cargo nextest run --run-ignored ignored-only -E 'test(gauntlet/)'
[[profile.default.overrides]]
filter = "test(gauntlet/)"
slow-timeout = { period = "120s", terminate-after = 2 }
retries = 1

[[profile.ci.overrides]]
filter = "test(gauntlet/)"
slow-timeout = { period = "120s", terminate-after = 2 }
retries = 2

# Performance-mode tests: each perf test acquires LLC locks at
# runtime via flock, so nextest parallelism is a soft limit.
# ── perf-vm ──────────────────────────────────────────────────────────
[test-groups.perf-vm]
max-threads = 8

[[profile.default.overrides]]
filter = "test(perf_on) | test(sched_perf_)"
test-group = "perf-vm"
threads-required = 1

[[profile.ci.overrides]]
filter = "test(perf_on) | test(sched_perf_)"
test-group = "perf-vm"
threads-required = 1

# Quick profile: exclude boot and bench tests.
[[profile.quick.overrides]]
filter = "test(boot_kernel) | test(bench_boot)"
slow-timeout = { period = "60s", terminate-after = 1 }

[[profile.quick.overrides]]
filter = "test(cover_) | test(neg_)"
slow-timeout = { period = "60s", terminate-after = 2 }
